# ==============================
# WA Blast UPJ — Docker Compose
# ==============================
# Deployment: VPS dengan Nginx reverse proxy + Certbot SSL
# Jalankan: docker compose up -d
# ==============================

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wablast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wablast
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: wablast_upj
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - wablast-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wablast"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wablast-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://wablast:${DB_PASSWORD:-changeme}@postgres:5432/wablast_upj?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      WA_API_KEY: ${WA_API_KEY}
      WA_API_BASE_URL: ${WA_API_BASE_URL}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@upj.ac.id}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-Admin123!}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME:-Admin UPJ}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wablast-network

volumes:
  postgres_data:

networks:
  wablast-network:
    driver: bridge
